<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Connexion</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f2f5;
      font-family: Arial, sans-serif;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .login-btn {
      background: #4CAF50;
      color: white;
    }

    .register-btn {
      background: #2196F3;
      color: white;
    }

    .error {
      color: red;
      font-size: 14px;
      text-align: center;
    }
  </style>

</head>

<body>

  <div class="container">
    <h2>Connexion</h2>

```
<input id="username" placeholder="Nom d'utilisateur">
    <input id="password" type="password" placeholder="Mot de passe">

<button class="login-btn" onclick="login()">Se connecter</button>
    <button class="register-btn" onclick="register()">S'inscrire</button>

<div class="error" id="error"></div>
```

  </div>

  <script src="Utilisateur.js"></script>

</body>
</html>

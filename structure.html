<!DOCTYPE html>
<html>
<head>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    .people-column {
      background-color: #f8f9fa;
      width: 80px;

      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 10px;
    }

    .person-icon {
      width: 50px;
      height: 50px;
      background-color: gray;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    .conversations-column {
      background-color: #e9ecef;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 10px;
      overflow-y: auto;
    }

    .chat-column {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background-color: #ffffff;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 10px;
      border-top: 1px solid #ddd;
      background-color: #f8f9fa;
    }

    .message-input {
      flex: 1;
    }
  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row vh-100">

    <!-- Left icons -->
    <div class="col-auto people-column">
      <div class="person-icon"></div>
      <div class="person-icon"></div>
      <div class="person-icon"></div>
    </div>

    <!-- Conversations -->
    <div class="col-3 conversations-column"></div>

    <!-- Chat -->
    <div class="col chat-column">

      <!-- Messages -->
      <div class="messages-area d-flex flex-column"></div>

      <!-- Input -->
      <div class="input-area">
        <input type="text" class="form-control message-input" placeholder="Type a message..." />
        <button class="btn btn-primary send-button">Send</button>
      </div>

    </div>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Your JS -->
<script type="module" src="Question.js"></script>

</body>
</html>

<!--
  Page principale de l’interface de discussion.

  Cette page contient :
  - la colonne des conversations
  - la zone d’affichage des messages
  - le champ de saisie utilisateur
  - le bouton d’envoi
  - les liens Bootstrap pour l’interface
  - les animations CSS utilisées pour la suppression des conversations

  Le fichier Question.js gère :
  - l’affichage dynamique des conversations
  - l’envoi des messages
  - la récupération des réponses IA
  - la création, suppression et modification des conversations

  @author Tianlang Xu
  @author Ryan Quoch
-->

<!DOCTYPE html>
<html>
<head>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    @property --deleteProgress {
  syntax: "<angle>";
  initial-value: 0deg;
  inherits: false;
}

@keyframes fillDeleteCircle {
  from {
    --deleteProgress: 0deg;
  }

  to {
    --deleteProgress: 360deg;
  }
}

    @keyframes spinDelete {
  from {
    transform: rotate(0deg);
  }

  to {
    transform: rotate(360deg);
  }
}
    html, body {
      margin: 0;
      height: 100%;
    }

    .people-column {
      background-color: #f8f9fa;
      width: 80px;

      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 10px;
    }

    .person-icon {
      width: 50px;
      height: 50px;
      background-color: gray;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    .conversations-column {
      background-color: #e9ecef;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 10px;
      overflow-y: auto;
    }

    .chat-column {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background-color: #ffffff;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 10px;
      border-top: 1px solid #ddd;
      background-color: #f8f9fa;
    }

    .message-input {
      flex: 1;
    }
  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row vh-100">

    <!-- Conversations -->
    <div class="col-3 conversations-column"></div>

    <!-- Chat -->
    <div class="col chat-column">

      <!-- Messages -->
      <div class="messages-area d-flex flex-column"></div>

      <!-- Input -->
      <div class="input-area">
        <input type="text" class="form-control message-input" placeholder="Type a message..." />
        <button class="btn btn-primary send-button">Send</button>
      </div>

    </div>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Your JS -->
<script type="module" src="Question.js"></script>

</body>
</html>
